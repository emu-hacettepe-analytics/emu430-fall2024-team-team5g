project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - data.qmd
    - analysis.qmd

website:
  title: "Migration, Crime & Education Analytics"
  site-url: https://emu-hacettepe-analytics.github.io/emu430-fall2024-team-team5g
  navbar:
    search: true
    background: dark
    left:
      - text: Home
        href: index.qmd
      - text: Data
        href: data.qmd
      - text: Analysis
        href: analysis.qmd
    tools:
      - icon: github
        href: https://github.com/emu-hacettepe-analytics/emu430-fall2024-team-team5g
      - icon: file-earmark-pdf
        href: report.pdf
        text: "Download PDF Report"

  page-navigation: true
  back-to-top-navigation: true

  page-footer:
    center: "Hacettepe IE — EMU 430 — Fall 2024"
    border: true

format:
  html:
    toc: true
    toc-location: left
    theme: [darkly, styles.scss]
    code-fold: true
    code-summary: "Show code"
    df-print: kable

editor: visual
