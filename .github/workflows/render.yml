name: Render and Deploy Quarto Website

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install R packages
        run: |
          pkgs <- c("readxl", "knitr", "rmarkdown",
                    "dplyr", "tidyr", "ggplot2", "scales", "forecast", "patchwork")
          install.packages(pkgs)
          lapply(pkgs, function(p) {
            if (!requireNamespace(p, quietly = TRUE))
              stop(paste("Package", p, "failed to install"))
          })
        shell: Rscript {0}

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX for PDF rendering
        run: quarto install tinytex --no-prompt

      - name: Render website (HTML)
        run: quarto render --verbose

      - name: Render PDF report
        run: quarto render report.qmd --to pdf --output-dir docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
